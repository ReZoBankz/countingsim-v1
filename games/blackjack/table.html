<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>CountingSim Blackjack Table</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at center, #0d5c28, #041208 70%);
      color: white;
      font-family: Arial, sans-serif;
      display: grid;
      place-items: center;
      text-align: center;
    }

    .box {
      max-width: 700px;
      padding: 30px;
      border: 2px solid rgba(255,255,255,.2);
      border-radius: 20px;
      background: rgba(0,0,0,.4);
    }

    a {
      color: #8affaa;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Blackjack Table Loaded</h1>
    <p>This confirms the menu is linking correctly.</p>
    <p id="tableId"></p>

    <p>
      <a href="../../index.html">Back to Menu</a>
    </p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const table = params.get("table");

    document.getElementById("tableId").textContent =
      "Selected table: " + (table || "none");
  </script>
</body>
</html>
